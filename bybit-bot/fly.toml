app = 'bybit-alpha-bot'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'bybit_data'
  destination = '/data/bybit-bot'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
